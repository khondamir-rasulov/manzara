services:
  db:
    image: postgres:16-alpine
    container_name: manzara-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: manzara
    ports:
      - "5433:5432"
    volumes:
      - manzara_db:/var/lib/postgresql/data

volumes:
  manzara_db:
